name: Update City Council roster

# Weekly refresh of data/app/council-members.json from council.nyc.gov/districts.
# Opens a PR, never commits to main (METRO_EXPANSION_PLAYBOOK §9).

on:
  schedule:
    - cron: "0 13 * * 4" # Thursday 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Scrape City Council members
        run: python3 scripts/council_scraper.py
      - name: Rebuild roster
        run: python3 scripts/build_council_roster.py
      - name: Validate app + data files
        run: python3 scripts/validate_index.py index.html
      - name: Check for changes
        id: diff
        run: git diff --quiet -- data/app/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="bot/council-roster-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/council-members.json
          git commit -m "Update City Council roster from council.nyc.gov"
          git push -u origin "$branch" --force
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create --title "Update City Council roster" \
              --body "Automated weekly refresh of NYC City Council members (\`scripts/council_scraper.py\` + \`build_council_roster.py\`). Review before merging." \
              --base main --head "$branch"
          fi
