name: Check school-zone dataset IDs

# NYC's ES/MS/HS school-zone Socrata dataset IDs rotate every school year
# (METRO_EXPANSION_PLAYBOOK Â§9). This monthly check flags a rotated (404) or
# stale (rowsUpdatedAt > 14 months) id and opens a tracking ISSUE â€” never a PR,
# since the fix is a human swapping the id in index.html + the check script.

on:
  schedule:
    - cron: "0 12 1 * *" # 1st of each month, 12:00 UTC
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check school-zone dataset freshness
        id: check
        env:
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
        run: |
          set +e
          out="$(python3 scripts/check_school_zone_ids.py 2>&1)"
          code=$?
          echo "$out"
          {
            echo "report<<REPORT_EOF"
            echo "$out"
            echo "REPORT_EOF"
            echo "status=$code"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Open a tracking issue if a dataset needs attention
        if: steps.check.outputs.status != '0'
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.check.outputs.report }}
        with:
          script: |
            const report = process.env.REPORT || "(no report)";
            const label = "school-zone-freshness";
            // Don't stack duplicates â€” reuse an already-open issue.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: label,
            });
            if (existing.data.length) {
              core.info("An open school-zone-freshness issue already exists; skipping.");
              return;
            }
            const body = [
              "The monthly school-zone freshness check flagged a problem â€” a zone dataset id",
              "likely rotated for a new school year, or its boundaries went stale.",
              "",
              "**Fix:** update the rotated id in `index.html` (the `es-zone` / `ms-zone` /",
              "`hs-zone` `registerSchoolZone` calls) and in `scripts/check_school_zone_ids.py`.",
              "",
              "```",
              report,
              "```",
              "",
              "_(METRO_EXPANSION_PLAYBOOK Â§9 â€” school-zone freshness chore)_",
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: "School-zone dataset IDs need attention",
              body,
              labels: [label],
            });
